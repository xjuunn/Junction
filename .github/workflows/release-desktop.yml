name: Release Multi Platform

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, supports v0.1.0 or 0.1.0'
        required: true
        type: string
      prerelease:
        description: 'Publish as prerelease'
        required: false
        default: false
        type: boolean
      export_method:
        description: 'iOS export method'
        required: false
        default: app-store-connect
        type: choice
        options:
          - app-store-connect
          - ad-hoc
          - development
      publish_release:
        description: 'Publish GitHub Release after build'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}-${{ github.event.inputs.release_tag || 'auto' }}
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: '20'
  PNPM_VERSION: '10.18.3'
  ANDROID_NDK_VERSION: '27.2.12479018'

jobs:
  validate:
    name: Validate Context
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      export_method: ${{ steps.meta.outputs.export_method }}
      publish_release: ${{ steps.meta.outputs.publish_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
            PRE="false"
            EXPORT_METHOD="app-store-connect"
            PUBLISH_RELEASE="true"
          else
            TAG="${{ github.event.inputs.release_tag }}"
            PRE="${{ github.event.inputs.prerelease }}"
            EXPORT_METHOD="${{ github.event.inputs.export_method }}"
            PUBLISH_RELEASE="${{ github.event.inputs.publish_release }}"
          fi

          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$ ]]; then
            TAG="v${TAG}"
          fi
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$ ]] || (echo "Invalid release tag: $TAG" && exit 1)

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRE" >> "$GITHUB_OUTPUT"
          echo "export_method=$EXPORT_METHOD" >> "$GITHUB_OUTPUT"
          echo "publish_release=$PUBLISH_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Verify tag/version consistency
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.release_tag }}"
          APP_VERSION="$(node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('apps/frontend/src-tauri/tauri.conf.json','utf8'));console.log(p.version)")"
          EXPECTED="v${APP_VERSION}"
          [[ "$TAG" == "$EXPECTED" ]] || (echo "Tag/version mismatch: tag=$TAG, expected=$EXPECTED" && exit 1)

  desktop:
    name: Desktop ${{ matrix.platform.name }}
    needs: validate
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-x64
            os: windows-latest
          - name: macos-arm64
            os: macos-14
          - name: linux-x64
            os: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/frontend/src-tauri -> target

      - name: Install Linux libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @junction/backend exec prisma generate --schema prisma/schema.prisma

      - name: Build workspace packages
        run: pnpm build:packages

      - name: Build desktop
        run: pnpm --filter @junction/frontend tauri build

      - name: Upload installers (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform.name }}
          path: |
            apps/frontend/src-tauri/target/release/bundle/**/*.msi
            apps/frontend/src-tauri/target/release/bundle/**/*.exe
            apps/frontend/src-tauri/target/release/bundle/**/*.msix
          if-no-files-found: error
          retention-days: 14

      - name: Upload installers (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform.name }}
          path: |
            apps/frontend/src-tauri/target/release/bundle/**/*.dmg
            apps/frontend/src-tauri/target/release/bundle/**/*.app.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Upload installers (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform.name }}
          path: |
            apps/frontend/src-tauri/target/release/bundle/**/*.AppImage
            apps/frontend/src-tauri/target/release/bundle/**/*.deb
            apps/frontend/src-tauri/target/release/bundle/**/*.rpm
          if-no-files-found: error
          retention-days: 14

  android:
    name: Android Signed Release
    needs: validate
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/frontend/src-tauri -> target

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Configure NDK env
        shell: bash
        run: |
          set -euo pipefail
          NDK_PATH="${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"
          [ -d "${NDK_PATH}" ] || (echo "NDK path not found: ${NDK_PATH}" && exit 1)
          echo "NDK_HOME=${NDK_PATH}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${NDK_PATH}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @junction/backend exec prisma generate --schema prisma/schema.prisma

      - name: Build workspace packages
        run: pnpm build:packages

      - name: Init Android project
        run: pnpm --filter @junction/frontend tauri android init --ci

      - name: Sanitize Android TLS trust store config
        shell: bash
        run: |
          set -euo pipefail
          GP="apps/frontend/src-tauri/gen/android/gradle.properties"
          [ -f "$GP" ] || (echo "Missing gradle.properties: $GP" && exit 1)
          sed -i '/^systemProp\.javax\.net\.ssl\.trustStoreType=/d' "$GP"
          sed -i '/^systemProp\.javax\.net\.ssl\.trustStore=/d' "$GP"
          sed -i '/^systemProp\.javax\.net\.ssl\.trustStorePassword=/d' "$GP"
          sed -i '/^systemProp\.javax\.net\.ssl\.trustStoreProvider=/d' "$GP"
          sed -i '/^systemProp\.javax\.net\.ssl\.trustStoreType=Windows-ROOT/d' "$GP"

      - name: Prepare Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_FILE_BASE64: ${{ secrets.ANDROID_KEYSTORE_FILE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          prop() {
            local f="$1"
            local k="$2"
            if [ -f "$f" ]; then
              grep -E "^${k}=" "$f" | head -n1 | cut -d'=' -f2- | tr -d '\r'
            fi
          }

          # Local signing files first, then fall back to secrets.
          KEYSTORE_B64=""
          if [ -s "apps/frontend/src-tauri/signing/android/release.keystore.base64" ]; then
            KEYSTORE_B64="$(tr -d '\n\r' < apps/frontend/src-tauri/signing/android/release.keystore.base64)"
          else
            KEYSTORE_B64="${ANDROID_KEYSTORE_BASE64:-$ANDROID_KEYSTORE_FILE_BASE64}"
          fi

          if [ -s "apps/frontend/src-tauri/signing/android/release.keystore" ]; then
            KEYSTORE_PATH="${GITHUB_WORKSPACE}/apps/frontend/src-tauri/signing/android/release.keystore"
          elif [ -n "${KEYSTORE_B64}" ]; then
            KEYSTORE_PATH="${RUNNER_TEMP}/android-release.keystore"
            echo "${KEYSTORE_B64}" | base64 -d > "${KEYSTORE_PATH}"
          elif [ -f "apps/frontend/src-tauri/gen/junction-release.keystore" ]; then
            KEYSTORE_PATH="${GITHUB_WORKSPACE}/apps/frontend/src-tauri/gen/junction-release.keystore"
          else
            echo "Missing Android keystore for release build"
            exit 1
          fi

          KEY_ALIAS="${ANDROID_KEY_ALIAS:-}"
          KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-}"
          STORE_PASSWORD="${ANDROID_KEYSTORE_PASSWORD:-}"

          [ -n "${KEY_ALIAS}" ] || KEY_ALIAS="$(prop apps/frontend/src-tauri/signing/android/signing.properties keyAlias)"
          [ -n "${KEY_PASSWORD}" ] || KEY_PASSWORD="$(prop apps/frontend/src-tauri/signing/android/signing.properties keyPassword)"
          [ -n "${STORE_PASSWORD}" ] || STORE_PASSWORD="$(prop apps/frontend/src-tauri/signing/android/signing.properties storePassword)"

          [ -n "${KEY_ALIAS}" ] || KEY_ALIAS="$(prop apps/frontend/src-tauri/gen/android/key.properties keyAlias)"
          [ -n "${KEY_PASSWORD}" ] || KEY_PASSWORD="$(prop apps/frontend/src-tauri/gen/android/key.properties keyPassword)"
          [ -n "${STORE_PASSWORD}" ] || STORE_PASSWORD="$(prop apps/frontend/src-tauri/gen/android/key.properties storePassword)"

          [ -n "${KEY_ALIAS}" ] || (echo "Missing Android keyAlias" && exit 1)
          [ -n "${KEY_PASSWORD}" ] || (echo "Missing Android keyPassword" && exit 1)
          [ -n "${STORE_PASSWORD}" ] || (echo "Missing Android storePassword" && exit 1)

          {
            echo "storePassword=${STORE_PASSWORD}"
            echo "keyPassword=${KEY_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "storeFile=${KEYSTORE_PATH}"
          } > apps/frontend/src-tauri/gen/android/key.properties

      - name: Build Android release
        env:
          JAVA_TOOL_OPTIONS: ''
          JDK_JAVA_OPTIONS: ''
        run: pnpm --filter @junction/frontend tauri android build --ci --apk --aab

      - name: Upload Android packages
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-signed
          path: |
            apps/frontend/src-tauri/gen/android/app/build/outputs/**/*.apk
            apps/frontend/src-tauri/gen/android/app/build/outputs/**/*.aab
          if-no-files-found: error
          retention-days: 14

  ios:
    name: iOS Signed Release
    needs: validate
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/frontend/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @junction/backend exec prisma generate --schema prisma/schema.prisma

      - name: Build workspace packages
        run: pnpm build:packages

      - name: Ensure CocoaPods
        run: pod --version || sudo gem install cocoapods

      - name: Init iOS project
        run: pnpm --filter @junction/frontend tauri ios init --ci

      - name: Resolve iOS signing material
        id: ios_sign
        shell: bash
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
          IOS_MOBILE_PROVISION_BASE64: ${{ secrets.IOS_MOBILE_PROVISION_BASE64 }}
          IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          # Local signing files first, then fall back to secrets.
          CERT_B64=""
          PROVISION_B64=""
          IOS_PWD=""
          DEV_TEAM=""

          if [ -s "apps/frontend/src-tauri/signing/ios/certificate.p12" ]; then
            CERT_B64="$(base64 < apps/frontend/src-tauri/signing/ios/certificate.p12 | tr -d '\n')"
          else
            CERT_B64="${IOS_CERTIFICATE:-$IOS_CERTIFICATE_BASE64}"
          fi

          if [ -s "apps/frontend/src-tauri/signing/ios/profile.mobileprovision" ]; then
            PROVISION_B64="$(base64 < apps/frontend/src-tauri/signing/ios/profile.mobileprovision | tr -d '\n')"
          else
            PROVISION_B64="${IOS_MOBILE_PROVISION:-$IOS_MOBILE_PROVISION_BASE64}"
          fi

          if [ -s "apps/frontend/src-tauri/signing/ios/certificate_password.txt" ]; then
            IOS_PWD="$(cat apps/frontend/src-tauri/signing/ios/certificate_password.txt)"
          else
            IOS_PWD="${IOS_CERTIFICATE_PASSWORD:-}"
          fi

          if [ -s "apps/frontend/src-tauri/signing/ios/development_team.txt" ]; then
            DEV_TEAM="$(cat apps/frontend/src-tauri/signing/ios/development_team.txt)"
          else
            DEV_TEAM="${IOS_DEVELOPMENT_TEAM:-$APPLE_DEVELOPMENT_TEAM}"
          fi

          MODE="release"
          if [ -z "${CERT_B64}" ] || [ -z "${PROVISION_B64}" ] || [ -z "${IOS_PWD}" ] || [ -z "${DEV_TEAM}" ]; then
            MODE="simulator-debug"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${MODE}" != "release" ]]; then
            echo "iOS signing materials incomplete on push tag, fallback to simulator build."
          fi

          if [ "${MODE}" = "release" ]; then
            python -c "import base64,sys;base64.b64decode(sys.argv[1],validate=True);base64.b64decode(sys.argv[2],validate=True)" "${CERT_B64}" "${PROVISION_B64}" || (echo "Invalid iOS certificate/mobileprovision base64" && exit 1)
            echo "ios_certificate=${CERT_B64}" >> "$GITHUB_OUTPUT"
            echo "ios_provision=${PROVISION_B64}" >> "$GITHUB_OUTPUT"
            echo "ios_password=${IOS_PWD}" >> "$GITHUB_OUTPUT"
            echo "ios_team=${DEV_TEAM}" >> "$GITHUB_OUTPUT"
          fi

          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"

      - name: Show iOS build mode
        run: echo "iOS build mode = ${{ steps.ios_sign.outputs.mode }}"

      - name: Build iOS signed IPA
        if: steps.ios_sign.outputs.mode == 'release'
        env:
          IOS_CERTIFICATE: ${{ steps.ios_sign.outputs.ios_certificate }}
          IOS_CERTIFICATE_PASSWORD: ${{ steps.ios_sign.outputs.ios_password }}
          IOS_MOBILE_PROVISION: ${{ steps.ios_sign.outputs.ios_provision }}
          APPLE_DEVELOPMENT_TEAM: ${{ steps.ios_sign.outputs.ios_team }}
        run: pnpm --filter @junction/frontend tauri ios build --ci --export-method ${{ needs.validate.outputs.export_method }}

      - name: Build iOS simulator fallback
        if: steps.ios_sign.outputs.mode != 'release'
        run: pnpm --filter @junction/frontend tauri ios build --ci --debug --target aarch64-sim

      - name: Upload iOS IPA
        if: steps.ios_sign.outputs.mode == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ios-signed
          path: apps/frontend/src-tauri/gen/apple/**/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload iOS simulator app
        if: steps.ios_sign.outputs.mode != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ios-simulator
          path: apps/frontend/src-tauri/gen/**/*.app
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: [validate, desktop, android, ios]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    if: needs.validate.outputs.publish_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # 只收集最终可分发安装包，避免把 .app 内部文件发布出去
          find dist -type f \( \
            -name "*.msi" -o -name "*.exe" -o -name "*.msix" -o \
            -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o \
            -name "*.apk" -o -name "*.aab" -o -name "*.ipa" \
          \) -print0 | while IFS= read -r -d '' f; do
            cp "$f" "release-assets/$(basename "$f")"
          done
          ls -la release-assets
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Show files
        run: find release-assets -type f | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.release_tag }}
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
