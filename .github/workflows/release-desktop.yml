name: Release Multi Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (example: v0.1.0)'
        required: true
        type: string
      prerelease:
        description: 'Publish as prerelease'
        required: false
        default: false
        type: boolean
      export_method:
        description: 'iOS export method'
        required: false
        default: app-store-connect
        type: choice
        options:
          - app-store-connect
          - ad-hoc
          - development

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}-${{ github.event.inputs.release_tag || 'auto' }}
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: '20'
  PNPM_VERSION: '10.18.3'

jobs:
  validate:
    name: Validate Release Context
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      export_method: ${{ steps.meta.outputs.export_method }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
            PRE=false
            EXPORT_METHOD="app-store-connect"
          else
            TAG="${{ github.event.inputs.release_tag }}"
            PRE="${{ github.event.inputs.prerelease }}"
            EXPORT_METHOD="${{ github.event.inputs.export_method }}"
          fi
          # 兼容 0.1.0 / v0.1.0，两者统一规范成 v 前缀
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$ ]]; then
            TAG="v${TAG}"
          fi
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$ ]] || (echo "Invalid release tag: $TAG" && exit 1)
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRE" >> "$GITHUB_OUTPUT"
          echo "export_method=$EXPORT_METHOD" >> "$GITHUB_OUTPUT"

      - name: Verify tag/version consistency
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.release_tag }}"
          APP_VERSION="$(node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('apps/frontend/src-tauri/tauri.conf.json','utf8'));console.log(p.version)")"
          EXPECTED="v${APP_VERSION}"
          if [[ "$TAG" != "$EXPECTED" ]]; then
            echo "Tag/version mismatch: tag=$TAG, tauri.conf.json=$EXPECTED"
            exit 1
          fi

  desktop:
    name: Build Desktop (${{ matrix.platform.name }})
    needs: validate
    timeout-minutes: 90
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-x64
            os: windows-latest
            archive_cmd: Compress-Archive -Path apps/frontend/src-tauri/target/release/bundle/* -DestinationPath release-bundle-windows-x64.zip -Force
            archive_name: release-bundle-windows-x64.zip
          - name: macos-arm64
            os: macos-14
            archive_cmd: tar -czf release-bundle-macos-arm64.tar.gz -C apps/frontend/src-tauri/target/release bundle
            archive_name: release-bundle-macos-arm64.tar.gz
          - name: linux-x64
            os: ubuntu-22.04
            archive_cmd: tar -czf release-bundle-linux-x64.tar.gz -C apps/frontend/src-tauri/target/release bundle
            archive_name: release-bundle-linux-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/frontend/src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @junction/backend exec prisma generate --schema prisma/schema.prisma

      - name: Build workspace packages
        run: pnpm build:packages

      - name: Build Tauri desktop
        run: pnpm --filter @junction/frontend tauri build

      - name: Assert bundle output
        shell: bash
        run: |
          [ -d "apps/frontend/src-tauri/target/release/bundle" ] || (echo "Bundle directory not found" && exit 1)

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: ${{ matrix.platform.archive_cmd }}

      - name: Archive (Non-Windows)
        if: runner.os != 'Windows'
        run: ${{ matrix.platform.archive_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform.name }}
          path: ${{ matrix.platform.archive_name }}
          if-no-files-found: error
          retention-days: 14

  android:
    name: Build Android (Release Or Debug Fallback)
    needs: validate
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/frontend/src-tauri -> target

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.2.12479018"

      - name: Configure Android NDK env
        shell: bash
        run: |
          NDK_PATH="${ANDROID_SDK_ROOT}/ndk/27.2.12479018"
          [ -d "${NDK_PATH}" ] || (echo "NDK path not found: ${NDK_PATH}" && exit 1)
          echo "NDK_HOME=${NDK_PATH}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${NDK_PATH}" >> "$GITHUB_ENV"
          echo "${NDK_PATH}" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @junction/backend exec prisma generate --schema prisma/schema.prisma

      - name: Build workspace packages
        run: pnpm build:packages

      - name: Init Android project
        run: pnpm --filter @junction/frontend tauri android init --ci

      - name: Normalize Android Gradle properties
        run: sed -i '/trustStoreType=Windows-ROOT/d' apps/frontend/src-tauri/gen/android/gradle.properties

      - name: Prepare Android signing config
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          prop() {
            local f="$1"
            local k="$2"
            if [ -f "$f" ]; then
              grep -E "^${k}=" "$f" | head -n1 | cut -d'=' -f2-
            fi
          }

          KEYSTORE_PATH=""
          BUILD_MODE="release"
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            KEYSTORE_PATH="${RUNNER_TEMP}/android-release.keystore"
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "${KEYSTORE_PATH}"
          elif [ -f "apps/frontend/src-tauri/signing/android/release.keystore" ]; then
            KEYSTORE_PATH="${GITHUB_WORKSPACE}/apps/frontend/src-tauri/signing/android/release.keystore"
          elif [ -f "apps/frontend/src-tauri/gen/junction-release.keystore" ]; then
            KEYSTORE_PATH="${GITHUB_WORKSPACE}/apps/frontend/src-tauri/gen/junction-release.keystore"
          else
            BUILD_MODE="debug"
            KEYSTORE_PATH="${HOME}/.android/debug.keystore"
            keytool -genkeypair -v -keystore "${KEYSTORE_PATH}" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true
          fi

          KEY_ALIAS="${ANDROID_KEY_ALIAS}"
          KEY_PASSWORD="${ANDROID_KEY_PASSWORD}"
          STORE_PASSWORD="${ANDROID_KEYSTORE_PASSWORD}"

          if [ -z "${KEY_ALIAS}" ]; then KEY_ALIAS="$(prop apps/frontend/src-tauri/signing/android/signing.properties keyAlias)"; fi
          if [ -z "${KEY_PASSWORD}" ]; then KEY_PASSWORD="$(prop apps/frontend/src-tauri/signing/android/signing.properties keyPassword)"; fi
          if [ -z "${STORE_PASSWORD}" ]; then STORE_PASSWORD="$(prop apps/frontend/src-tauri/signing/android/signing.properties storePassword)"; fi

          if [ -z "${KEY_ALIAS}" ]; then KEY_ALIAS="$(prop apps/frontend/src-tauri/gen/android/key.properties keyAlias)"; fi
          if [ -z "${KEY_PASSWORD}" ]; then KEY_PASSWORD="$(prop apps/frontend/src-tauri/gen/android/key.properties keyPassword)"; fi
          if [ -z "${STORE_PASSWORD}" ]; then STORE_PASSWORD="$(prop apps/frontend/src-tauri/gen/android/key.properties storePassword)"; fi

          if [ "${BUILD_MODE}" = "release" ]; then
            [ -n "${KEY_ALIAS}" ] || (echo "Missing Android keyAlias" && exit 1)
            [ -n "${KEY_PASSWORD}" ] || (echo "Missing Android keyPassword" && exit 1)
            [ -n "${STORE_PASSWORD}" ] || (echo "Missing Android storePassword" && exit 1)
          else
            KEY_ALIAS="androiddebugkey"
            KEY_PASSWORD="android"
            STORE_PASSWORD="android"
            echo "Android signing material missing, fallback to debug APK build."
          fi

          cat > apps/frontend/src-tauri/gen/android/key.properties <<EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=${KEYSTORE_PATH}
          EOF
          echo "ANDROID_BUILD_MODE=${BUILD_MODE}" >> "$GITHUB_ENV"

      - name: Build Android package
        shell: bash
        run: |
          if [ "${ANDROID_BUILD_MODE}" = "release" ]; then
            pnpm --filter @junction/frontend tauri android build --ci --apk --aab
          else
            pnpm --filter @junction/frontend tauri android build --ci --debug --apk
          fi

      - name: Collect Android artifacts
        shell: bash
        run: |
          mkdir -p mobile-dist/android
          find apps/frontend/src-tauri/gen/android/app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \) -exec cp {} mobile-dist/android/ \;
          [ -n "$(ls -A mobile-dist/android)" ] || (echo "Signed Android outputs not found" && exit 1)
          tar -czf release-bundle-android-signed.tar.gz -C mobile-dist android

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-signed
          path: release-bundle-android-signed.tar.gz
          if-no-files-found: error
          retention-days: 14

  ios:
    name: Build iOS (Signed IPA Or Simulator Fallback)
    needs: validate
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/frontend/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @junction/backend exec prisma generate --schema prisma/schema.prisma

      - name: Build workspace packages
        run: pnpm build:packages

      - name: Ensure CocoaPods
        run: pod --version || sudo gem install cocoapods

      - name: Init iOS project
        run: pnpm --filter @junction/frontend tauri ios init --ci

      - name: Prepare iOS signing config
        shell: bash
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
          IOS_MOBILE_PROVISION_BASE64: ${{ secrets.IOS_MOBILE_PROVISION_BASE64 }}
        run: |
          CERT_B64="${IOS_CERTIFICATE:-$IOS_CERTIFICATE_BASE64}"
          PROVISION_B64="${IOS_MOBILE_PROVISION:-$IOS_MOBILE_PROVISION_BASE64}"
          IOS_PWD="${IOS_CERTIFICATE_PASSWORD}"

          if [ -z "${CERT_B64}" ] && [ -f "apps/frontend/src-tauri/signing/ios/certificate.p12" ]; then
            CERT_B64="$(base64 < apps/frontend/src-tauri/signing/ios/certificate.p12 | tr -d '\n')"
          fi
          if [ -z "${PROVISION_B64}" ] && [ -f "apps/frontend/src-tauri/signing/ios/profile.mobileprovision" ]; then
            PROVISION_B64="$(base64 < apps/frontend/src-tauri/signing/ios/profile.mobileprovision | tr -d '\n')"
          fi
          if [ -z "${IOS_PWD}" ] && [ -f "apps/frontend/src-tauri/signing/ios/certificate_password.txt" ]; then
            IOS_PWD="$(cat apps/frontend/src-tauri/signing/ios/certificate_password.txt)"
          fi

          IOS_BUILD_MODE="release"
          if [ -z "${CERT_B64}" ] || [ -z "${PROVISION_B64}" ] || [ -z "${IOS_PWD}" ]; then
            IOS_BUILD_MODE="simulator-debug"
            echo "iOS signing material missing, fallback to simulator debug build."
          fi

          echo "IOS_CERTIFICATE_B64=${CERT_B64}" >> "$GITHUB_ENV"
          echo "IOS_MOBILE_PROVISION_B64=${PROVISION_B64}" >> "$GITHUB_ENV"
          echo "IOS_CERTIFICATE_PASSWORD_VALUE=${IOS_PWD}" >> "$GITHUB_ENV"
          echo "IOS_BUILD_MODE=${IOS_BUILD_MODE}" >> "$GITHUB_ENV"

      - name: Build iOS package
        shell: bash
        env:
          IOS_CERTIFICATE: ${{ env.IOS_CERTIFICATE_B64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ env.IOS_CERTIFICATE_PASSWORD_VALUE }}
          IOS_MOBILE_PROVISION: ${{ env.IOS_MOBILE_PROVISION_B64 }}
        run: |
          if [ "${IOS_BUILD_MODE}" = "release" ]; then
            pnpm --filter @junction/frontend tauri ios build --ci --export-method ${{ needs.validate.outputs.export_method }}
          else
            pnpm --filter @junction/frontend tauri ios build --ci --debug --target aarch64-sim
          fi

      - name: Collect iOS artifacts
        shell: bash
        run: |
          mkdir -p mobile-dist/ios
          if [ "${IOS_BUILD_MODE}" = "release" ]; then
            find apps/frontend/src-tauri/gen/apple -type f -name "*.ipa" -exec cp {} mobile-dist/ios/ \;
          else
            find apps/frontend/src-tauri/gen -type d -name "*.app" -exec cp -R {} mobile-dist/ios/ \;
          fi
          [ -n "$(ls -A mobile-dist/ios)" ] || (echo "iOS output not found" && exit 1)
          tar -czf release-bundle-ios-signed.tar.gz -C mobile-dist ios

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ios-signed
          path: release-bundle-ios-signed.tar.gz
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: [validate, desktop, android, ios]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          find . -type f -maxdepth 3 -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Show release files
        run: find dist -type f | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.release_tag }}
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
