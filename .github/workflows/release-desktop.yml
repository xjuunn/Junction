name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-x64
            os: windows-latest
            archive_cmd: Compress-Archive -Path apps/frontend/src-tauri/target/release/bundle/* -DestinationPath release-bundle-windows-x64.zip -Force
            archive_name: release-bundle-windows-x64.zip
          - name: macos-arm64
            os: macos-14
            archive_cmd: tar -czf release-bundle-macos-arm64.tar.gz -C apps/frontend/src-tauri/target/release bundle
            archive_name: release-bundle-macos-arm64.tar.gz
          - name: linux-x64
            os: ubuntu-22.04
            archive_cmd: tar -czf release-bundle-linux-x64.tar.gz -C apps/frontend/src-tauri/target/release bundle
            archive_name: release-bundle-linux-x64.tar.gz

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm --filter @junction/frontend tauri build

      - name: Pack build artifacts
        shell: bash
        run: |
          if [ ! -d "apps/frontend/src-tauri/target/release/bundle" ]; then
            echo "Bundle directory not found"
            exit 1
          fi

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: ${{ matrix.platform.archive_cmd }}

      - name: Archive (Non-Windows)
        if: runner.os != 'Windows'
        run: ${{ matrix.platform.archive_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}
          path: ${{ matrix.platform.archive_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show files
        run: find dist -type f

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
