version: "3.9"
services:
  livekit:
    image: livekit/livekit-server:latest
    environment:
      NODE_IP: ${NUXT_PUBLIC_SERVER_HOST:-127.0.0.1}
      REDIS_HOST: ''
    command:
      - --config
      - /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
