version: "3.9"
services:
  livekit:
    image: livekit/livekit-server:latest
    env_file:
      - ../../.env
    command: /bin/sh -c "exec livekit-server --config /etc/livekit.yaml --node-ip $${LIVEKIT_NODE_IP:-$${NUXT_PUBLIC_SERVER_HOST:-127.0.0.1}}"
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
